<!DOCTYPE html> <!--essa tag é pra entender que estamos trabalhando com a versão 5 do html-->
<html lang="en"> <!-- iniciando pagina html-->

        <title>Little Snake</title> <!-- adicionando titulo a pagina-->

        <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!--isso é uma linha para compatibilidade do antigo navegador microsoft edge-->

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=play_circle" />
